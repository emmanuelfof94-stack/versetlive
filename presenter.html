<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersetLive — Mode Présentateur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: #0a0e1a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    .presenter-wrap {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      gap: 12px;
      padding: 16px;
    }

    /* HEADER : horloge */
    .presenter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    .presenter-title-text {
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .clock {
      font-family: ui-monospace, "Courier New", monospace;
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      font-variant-numeric: tabular-nums;
    }
    .on-air {
      font-size: 13px;
      letter-spacing: 0.15em;
      padding: 6px 14px;
      border-radius: 6px;
      background: #475569;
      color: #cbd5e1;
      font-weight: 700;
    }
    .on-air.live {
      background: #ef4444;
      color: white;
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* MIDDLE : contenu en cours de diffusion */
    .stage-mirror {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-radius: 16px;
      border: 1px solid #334155;
      overflow: hidden;
      position: relative;
    }
    .stage-label {
      position: absolute;
      top: 14px; left: 18px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #64748b;
    }
    .mirror-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(28px, 4vw, 56px);
      line-height: 1.4;
      text-align: center;
      max-width: 90%;
      color: #f8fafc;
    }
    .mirror-ref {
      font-size: clamp(16px, 1.6vw, 24px);
      margin-top: 18px;
      color: #d4af37;
      font-style: italic;
    }
    .mirror-empty {
      color: #475569;
      font-size: 22px;
      font-style: italic;
    }

    /* FOOTER : minuteur */
    .timer-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      align-items: center;
    }
    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .timer-block-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .timer-big {
      font-family: ui-monospace, "Courier New", monospace;
      font-size: 84px;
      font-weight: 700;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: #f1f5f9;
      line-height: 1;
      transition: color 0.3s, transform 0.3s;
    }
    .timer-big.warning { color: #f59e0b; }
    .timer-big.critical {
      color: #ef4444;
      animation: pulse-scale 1s infinite;
    }
    .timer-big.over {
      color: #ef4444;
      text-shadow: 0 0 20px rgba(239,68,68,0.6);
    }
    @keyframes pulse-scale {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    .timer-controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }
    .timer-controls button {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #334155;
      color: #f1f5f9;
    }
    .timer-controls button:hover { background: #475569; }
    .timer-controls button.start { background: #10b981; }
    .timer-controls button.pause { background: #f59e0b; }
    .timer-controls button.reset { background: #ef4444; }

    .timer-mode-tag {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #64748b;
      margin-top: 6px;
    }

    /* Indication progression compte à rebours */
    .progress {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      border-radius: 0 0 12px 12px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, #10b981, #f59e0b, #ef4444);
      width: 0%;
      transition: width 0.3s;
    }

    .stage-mirror, .timer-section { position: relative; }
  </style>
</head>
<body>
  <div class="presenter-wrap">
    <!-- HEADER -->
    <div class="presenter-header">
      <div class="presenter-title-text">👁 Mode Présentateur</div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="on-air" id="onAir">EN ATTENTE</div>
    </div>

    <!-- MIROIR DE LA DIFFUSION -->
    <div class="stage-mirror">
      <div class="stage-label" id="stageLabel">À L'ANTENNE</div>
      <div id="mirrorContent" class="mirror-empty">Aucun verset diffusé</div>
    </div>

    <!-- MINUTEUR -->
    <div class="timer-section">
      <div class="timer-block">
        <div class="timer-block-label">⏱ Chronomètre</div>
        <div class="timer-big" id="bigTimer">00:00</div>
        <div class="timer-mode-tag" id="bigTimerTag">À l'arrêt</div>
      </div>

      <div class="timer-block">
        <div class="timer-block-label">🕐 Heure actuelle</div>
        <div class="timer-big" id="bigClock" style="font-size:64px;">--:--</div>
        <div class="timer-controls">
          <button class="start" id="pStart">▶ Démarrer</button>
          <button class="pause" id="pPause" style="display:none;">⏸ Pause</button>
          <button class="reset" id="pReset">↺</button>
        </div>
      </div>

      <div class="progress" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <script src="presenter.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
