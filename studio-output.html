<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sortie projecteur — VersetLive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }
    body { display: flex; align-items: center; justify-content: center; }
    video {
      width: 100%; height: 100%; object-fit: contain;
      background: #000;
    }
    body:hover { cursor: default; }
  </style>
</head>
<body>
  <video id="output" autoplay playsinline></video>
  <iframe id="iframeOverlay" hidden allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen
    style="position:fixed; inset:0; width:100%; height:100%; border:0; background:#000; z-index:10;"></iframe>

  <script>
    const video = document.getElementById('output');
    const iframeOverlay = document.getElementById('iframeOverlay');

    // Appelé par la fenêtre parente (studio.js). On évite de réassigner srcObject
    // si c'est déjà le même flux : ça causait un saut/flicker à chaque toggle
    // audio/record/stream côté studio. La projection reste continue.
    window.setProgramStream = function (stream) {
      if (video.srcObject === stream) return;
      video.srcObject = stream;
      video.play().catch(() => {});
    };

    // Mode iframe (YouTube/Vimeo) : superpose un lecteur tiers par-dessus le canvas.
    // Appelé par studio.js quand on bascule sur une scène { kind: 'iframe', url }.
    window.setIframeUrl = function (url) {
      if (!url) { window.clearIframe(); return; }
      if (iframeOverlay.src !== url) iframeOverlay.src = url;
      iframeOverlay.hidden = false;
    };
    window.clearIframe = function () {
      iframeOverlay.hidden = true;
      // Reset src pour stopper l'audio/vidéo de la plateforme externe.
      if (iframeOverlay.src) iframeOverlay.src = 'about:blank';
    };

    // F11 pour plein écran (Mac : Cmd+Ctrl+F)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F11' || (e.key === 'f' && (e.metaKey || e.ctrlKey))) {
        e.preventDefault();
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }
      if (e.key === 'Escape' && document.fullscreenElement) document.exitFullscreen();
    });

    // Si la fenêtre parente est fermée, on se ferme aussi
    setInterval(() => {
      if (!window.opener || window.opener.closed) window.close();
    }, 2000);
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
