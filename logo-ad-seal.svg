<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Église Assemblée de Dieu Broukoi-Jérusalem — Sceau circulaire">
  <title>AD Broukoi — Sceau circulaire officiel</title>
  <defs>
    <radialGradient id="bgSeal" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#322882"/>
      <stop offset="0.7" stop-color="#1a1f4a"/>
      <stop offset="1" stop-color="#0a0d24"/>
    </radialGradient>
    <linearGradient id="goldSeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8C45A"/>
      <stop offset="0.5" stop-color="#B38E29"/>
      <stop offset="1" stop-color="#7A5C12"/>
    </linearGradient>
    <path id="textRingTop" d="M 256 256 m -198 0 a 198 198 0 1 1 396 0" fill="none"/>
    <path id="textRingBottom" d="M 256 256 m -188 0 a 188 188 0 1 0 376 0" fill="none"/>
  </defs>

  <!-- Cercle extérieur or -->
  <circle cx="256" cy="256" r="240" fill="url(#goldSeal)"/>
  <!-- Anneau intérieur bleu nuit -->
  <circle cx="256" cy="256" r="225" fill="url(#bgSeal)" stroke="#B38E29" stroke-width="2"/>
  <!-- Anneau ouvragé -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#B38E29" stroke-width="2"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#322882" stroke-width="1"/>

  <!-- Texte autour : nom -->
  <text font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="22" fill="#B38E29" letter-spacing="6">
    <textPath href="#textRingTop" startOffset="50%" text-anchor="middle">EGLISE ASSEMBLÉE DE DIEU</textPath>
  </text>
  <text font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="20" fill="#B38E29" letter-spacing="8">
    <textPath href="#textRingBottom" startOffset="50%" text-anchor="middle">★ BROUKOI · JÉRUSALEM ★</textPath>
  </text>

  <!-- Étoiles séparatrices gauche/droite -->
  <g fill="#B38E29">
    <polygon points="56,256 64,250 68,256 64,262" />
    <polygon points="456,256 448,250 444,256 448,262" />
  </g>

  <!-- AD monogram central -->
  <g transform="translate(256 256)">
    <!-- Lettre A indigo -->
    <path d="M -80 60 L -30 -70 L 0 -70 L -30 60 Z M -65 30 L -10 30 L -10 45 L -65 45 Z"
          fill="#322882" stroke="#B38E29" stroke-width="2"/>
    <!-- Lettre D cobalt -->
    <path d="M -10 -70 L 50 -70 C 100 -70 100 60 50 60 L -10 60 Z M 10 -50 L 10 40 L 50 40 C 80 40 80 -50 50 -50 Z"
          fill="#204B9A" stroke="#B38E29" stroke-width="2"/>
    <!-- Croix au centre du A -->
    <g fill="#FCFCFC">
      <rect x="-45" y="-50" width="6" height="44" rx="1"/>
      <rect x="-55" y="-38" width="26" height="6" rx="1"/>
    </g>
  </g>

  <!-- Slogan minuscule sous le monogramme -->
  <text x="256" y="380" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="14" fill="#FCFCFC" letter-spacing="3">PSAUMES 60:14</text>
  <text x="256" y="402" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#B38E29">Avec Dieu nous ferons des exploits</text>
</svg>
